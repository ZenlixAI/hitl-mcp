version: '3.9'
services:
  redis:
    image: redis:7-alpine
    container_name: hitl-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  hitl-mcp:
    build: .
    container_name: hitl-mcp
    depends_on:
      redis:
        condition: service_healthy
    environment:
      PORT: 3000
      MCP_URL: http://localhost:3000
      HITL_STORAGE: redis
      HITL_REDIS_URL: redis://redis:6379
      HITL_REDIS_PREFIX: hitl
      HITL_TTL_SECONDS: 604800
      HITL_ENABLE_METRICS: 'true'
    ports:
      - '3000:3000'
